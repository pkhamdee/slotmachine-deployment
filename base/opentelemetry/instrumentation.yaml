apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: slotmachine
spec:
  exporter:
    endpoint: http://jaeger-jaeger-operator-jaeger-collector.istio-system:4317
  propagators:
    - tracecontext
    - baggage
    - b3
  sampler:
    type: parentbased_traceidratio
    argument: "1"
  nodejs:
    env:
      - name: OTEL_SERVICE_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.labels['app']
