apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: server
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          envFrom:
            - configMapRef:
                name: server-config
          command:
            - sh
            - -c
            - |
              HOST=$(echo $MONGO_URI | sed 's|mongodb://||' | cut -d/ -f1 | cut -d: -f1)
              PORT=$(echo $MONGO_URI | sed 's|mongodb://||' | cut -d/ -f1 | cut -d: -f2)
              until nc -z $HOST $PORT; do echo "waiting for $HOST:$PORT"; sleep 2; done
        - name: wait-for-redis
          image: busybox:1.36
          envFrom:
            - configMapRef:
                name: server-config
          command:
            - sh
            - -c
            - |
              HOST=$(echo $REDIS_URL | sed 's|redis://||' | cut -d: -f1)
              PORT=$(echo $REDIS_URL | sed 's|redis://||' | cut -d: -f2)
              until nc -z $HOST $PORT; do echo "waiting for $HOST:$PORT"; sleep 2; done
      containers:
        - name: server
          image: slotmachine-server:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: server-config
            - secretRef:
                name: server-secret
          readinessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
