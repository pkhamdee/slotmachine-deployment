apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: dev-

resources:
- ../../base

patches:
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: slotmachine.dev.example.com
  target:
    kind: Ingress
    name: client
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment

images:
- name: slotmachine-client
  newName: pkhamdee/slotmachine
  newTag: client-23dff371c29668b1c8335c773fbb88c745e52f76
- name: slotmachine-server
  newName: pkhamdee/slotmachine
  newTag: server-23dff371c29668b1c8335c773fbb88c745e52f76

commonLabels:
  environment: development
