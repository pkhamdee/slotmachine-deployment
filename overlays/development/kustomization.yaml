apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: dev-

resources:
- ../../base

patches:
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: slotmachine.dev.example.com
  target:
    kind: Ingress
    name: client
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment

images:
- name: slotmachine-client
  newName: pkhamdee/slotmachine
  newTag: client-6b490e4da059c0eaa4052340af367b3359f8ce3c
- name: slotmachine-server
  newName: pkhamdee/slotmachine
  newTag: server-6b490e4da059c0eaa4052340af367b3359f8ce3c

commonLabels:
  environment: development
