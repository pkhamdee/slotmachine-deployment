apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: dev-

resources:
- ../../base

patches:
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: slotmachine.dev.example.com
  target:
    kind: Ingress
    name: client
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment

images:
- name: slotmachine-client
  newName: pkhamdee/slotmachine
  newTag: client-5c1786423f263f23099ac83ff6becbbc3288c9ee
- name: slotmachine-server
  newName: pkhamdee/slotmachine
  newTag: server-5c1786423f263f23099ac83ff6becbbc3288c9ee

commonLabels:
  environment: development
