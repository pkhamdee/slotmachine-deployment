apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: development

resources:
- ../../base
- namespace.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment

images:
- name: slotmachine-client
  newName: pkhamdee/slotmachine
  newTag: client-9aa6e5b05d46c9f8bab93a1f4dc737f5ba84233e
- name: slotmachine-server
  newName: pkhamdee/slotmachine
  newTag: server-9aa6e5b05d46c9f8bab93a1f4dc737f5ba84233e

commonLabels:
  environment: development
