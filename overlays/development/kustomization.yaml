apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: dev-

resources:
- ../../base

patches:
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: slotmachine.dev.example.com
  target:
    kind: Ingress
    name: client
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
- patch: |-
    - op: replace
      path: /data/MONGO_URI
      value: mongodb://dev-mongodb:27017/slotmachine
  target:
    kind: ConfigMap
    name: server-config

images:
- name: slotmachine-client
  newName: pkhamdee/slotmachine
  newTag: client-b06715fb34fbd73056994e81896b7b7e91c51a6d
- name: slotmachine-server
  newName: pkhamdee/slotmachine
  newTag: server-b06715fb34fbd73056994e81896b7b7e91c51a6d

commonLabels:
  environment: development
