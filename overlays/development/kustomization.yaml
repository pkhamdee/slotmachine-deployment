apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: development

resources:
- ../../base
- namespace.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: slotmachine-dev.10.7.48.70.sslip.io  #patches host to slotmachine.<dev-lb-ip>.sslip.io
  target:
    kind: Ingress
    name: client
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment

images:
- name: slotmachine-client
  newName: pkhamdee/slotmachine
  newTag: client-e4f33eeeb26fbb3670a86c5a0800e66f317aa756
- name: slotmachine-server
  newName: pkhamdee/slotmachine
  newTag: server-e4f33eeeb26fbb3670a86c5a0800e66f317aa756

commonLabels:
  environment: development
