apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: development

resources:
- ../../base
- namespace.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment

images:
- name: slotmachine-client
  newName: pkhamdee/slotmachine
  newTag: client-ef34dc666b16ddede334962a70968445931c9e0e
- name: slotmachine-server
  newName: pkhamdee/slotmachine
  newTag: server-ef34dc666b16ddede334962a70968445931c9e0e

commonLabels:
  environment: development
