apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: development

resources:
- ../../base
- namespace.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment

images:
- name: slotmachine-client
  newName: pkhamdee/slotmachine
  newTag: client-dfcaf3a5e5f8ac75f5f9e6e252010c1bd58e8e56
- name: slotmachine-server
  newName: pkhamdee/slotmachine
  newTag: server-dfcaf3a5e5f8ac75f5f9e6e252010c1bd58e8e56

commonLabels:
  environment: development
