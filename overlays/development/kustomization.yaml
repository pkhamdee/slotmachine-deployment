apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: development

resources:
- ../../base
- namespace.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment

images:
- name: slotmachine-client
  newName: pkhamdee/slotmachine
  newTag: client-fb180b7c76e5dbbb17414aff80d79a3b4f99611b
- name: slotmachine-server
  newName: pkhamdee/slotmachine
  newTag: server-fb180b7c76e5dbbb17414aff80d79a3b4f99611b

commonLabels:
  environment: development
