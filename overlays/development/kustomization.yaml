apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: dev-

resources:
- ../../base

patches:
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: slotmachine.dev.example.com
  target:
    kind: Ingress
    name: client
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment

images:
- name: slotmachine-client
  newName: pkhamdee/slotmachine
  newTag: client-15f009b9f66a69b5b06bf9ecffa84ff97aa7c55c
- name: slotmachine-server
  newName: pkhamdee/slotmachine
  newTag: server-15f009b9f66a69b5b06bf9ecffa84ff97aa7c55c

commonLabels:
  environment: development
