apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: development

resources:
- ../../base
- namespace.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment

images:
- name: slotmachine-client
  newName: pkhamdee/slotmachine
  newTag: client-bb2fab2c83942df113aa779263cb5d2612226e57
- name: slotmachine-server
  newName: pkhamdee/slotmachine
  newTag: server-bb2fab2c83942df113aa779263cb5d2612226e57

commonLabels:
  environment: development
