apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: development

resources:
- ../../base
- namespace.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment

images:
- name: slotmachine-client
  newName: pkhamdee/slotmachine
  newTag: client-fdf2fd8c50d50d64b2c3e83df8aa8c96b9bb86fe
- name: slotmachine-server
  newName: pkhamdee/slotmachine
  newTag: server-fdf2fd8c50d50d64b2c3e83df8aa8c96b9bb86fe

commonLabels:
  environment: development
