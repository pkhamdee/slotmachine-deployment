apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: dev-

resources:
- ../../base

patches:
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: slotmachine.dev.example.com
  target:
    kind: Ingress
    name: client
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment

images:
- name: slotmachine-client
  newName: pkhamdee/slotmachine
  newTag: client-e7524f09641388249c29d28125cdbd5c96d62252
- name: slotmachine-server
  newName: pkhamdee/slotmachine
  newTag: server-e7524f09641388249c29d28125cdbd5c96d62252

commonLabels:
  environment: development
