apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: development

resources:
- ../../base
- namespace.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment

images:
- name: slotmachine-client
  newName: pkhamdee/slotmachine
  newTag: client-cb709de12585e87f82832220631cd5103174161d
- name: slotmachine-server
  newName: pkhamdee/slotmachine
  newTag: server-cb709de12585e87f82832220631cd5103174161d

commonLabels:
  environment: development
