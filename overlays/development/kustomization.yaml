apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: dev-

resources:
- ../../base

patches:
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: slotmachine.dev.example.com
  target:
    kind: Ingress
    name: client
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment

images:
- name: slotmachine-client
  newName: pkhamdee/slotmachine
  newTag: client-f4d65af41420847a00b0e547d156f3b04ab4eab8
- name: slotmachine-server
  newName: pkhamdee/slotmachine
  newTag: server-f4d65af41420847a00b0e547d156f3b04ab4eab8

commonLabels:
  environment: development
