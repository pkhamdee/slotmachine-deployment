apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: dev-

resources:
- ../../base

patches:
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: slotmachine.dev.example.com
  target:
    kind: Ingress
    name: client
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment

images:
- name: slotmachine-client
  newName: pkhamdee/slotmachine
  newTag: client-050e1581a1c9bfe8b6fc2f6cf96c8cb50638b5aa
- name: slotmachine-server
  newName: pkhamdee/slotmachine
  newTag: server-050e1581a1c9bfe8b6fc2f6cf96c8cb50638b5aa

commonLabels:
  environment: development
