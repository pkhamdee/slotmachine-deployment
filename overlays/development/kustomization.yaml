apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: development

resources:
- ../../base
- namespace.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment

images:
- name: slotmachine-client
  newName: pkhamdee/slotmachine
  newTag: client-0182e9a5f1a59f2570e446db7eca1e2d2c6ae7d0
- name: slotmachine-server
  newName: pkhamdee/slotmachine
  newTag: server-0182e9a5f1a59f2570e446db7eca1e2d2c6ae7d0

commonLabels:
  environment: development
