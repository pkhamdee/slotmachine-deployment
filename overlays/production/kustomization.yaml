apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production

resources:
- ../../base
- namespace.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 4
  target:
    kind: Deployment
    name: client
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 4
  target:
    kind: Deployment
    name: server
- patch: |-
    - op: add
      path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
      value: 20Gi
  target:
    kind: StatefulSet
    name: mongodb
- patch: |-
    - op: add
      path: /metadata/annotations
      value:
        service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
        service.beta.kubernetes.io/aws-load-balancer-type: external
  target:
    kind: Service
    name: client

images:
- name: slotmachine-client
  newName: pkhamdee/slotmachine
  newTag: client-22b6d94784607eaaed6a506ce9e9c55aabe42fb8
- name: slotmachine-server
  newName: pkhamdee/slotmachine
  newTag: server-22b6d94784607eaaed6a506ce9e9c55aabe42fb8

commonLabels:
  environment: production
