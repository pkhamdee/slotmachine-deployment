apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production

resources:
- ../../base
- namespace.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 4
  target:
    kind: Deployment
    name: client
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 6
  target:
    kind: Deployment
    name: server
- patch: |-
    - op: add
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 512Mi
  target:
    kind: Deployment
    name: server
- patch: |-
    - op: add
      path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
      value: 20Gi
  target:
    kind: StatefulSet
    name: mongodb
- patch: |-
    - op: add
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 500m
          memory: 512Mi
        limits:
          cpu: 2000m
          memory: 1Gi
  target:
    kind: StatefulSet
    name: mongodb
- patch: |-
    - op: add
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
  target:
    kind: Deployment
    name: redis
- patch: |-
    - op: add
      path: /metadata/annotations
      value:
        service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
        service.beta.kubernetes.io/aws-load-balancer-type: external
  target:
    kind: Service
    name: client

images:
- name: slotmachine-client
  newName: pkhamdee/slotmachine
  newTag: client-102c40ace1bd960eabf3e5edfcba58e576b880c3
- name: slotmachine-server
  newName: pkhamdee/slotmachine
  newTag: server-102c40ace1bd960eabf3e5edfcba58e576b880c3

commonLabels:
  environment: production
