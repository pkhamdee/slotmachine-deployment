apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: production

resources:
- ../../base
- namespace.yaml

patches:
- patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: slotmachine.10.38.206.19.sslip.io  #patches host to your production domain
  target:
    kind: Ingress
    name: client
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
    name: client
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
  target:
    kind: Deployment
    name: server
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/cpu
      value: "1"
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: 1Gi
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: 200m
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: 256Mi
  target:
    kind: Deployment
    name: server
- patch: |-
    - op: add
      path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
      value: 20Gi
  target:
    kind: StatefulSet
    name: mongodb

images:
- name: slotmachine-client
  newName: pkhamdee/slotmachine
  newTag: client-b06715fb34fbd73056994e81896b7b7e91c51a6d
- name: slotmachine-server
  newName: pkhamdee/slotmachine
  newTag: server-b06715fb34fbd73056994e81896b7b7e91c51a6d

commonLabels:
  environment: production
